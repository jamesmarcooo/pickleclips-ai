name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check EC2 configured
        id: ec2
        run: |
          if [ -n "$EC2_HOST" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
          fi
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Deploy to EC2
        if: steps.ec2.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/pickleclips
            git pull origin main
            cd backend
            pip install -r requirements.txt
            sudo systemctl restart pickleclips-api
            sudo systemctl restart pickleclips-worker
            sudo systemctl restart pickleclips-beat
