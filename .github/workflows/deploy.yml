name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backend tests
        working-directory: backend
        run: |
          # torchreid's setup.py imports the full package to read its version,
          # pulling in the entire dependency chain before pip can satisfy them.
          # Fix: install all other deps first, then torchreid with --no-build-isolation
          # so its runtime deps are already present when setup.py executes.
          grep -v "torchreid" requirements.txt | pip install -r /dev/stdin
          pip install "Cython"
          pip install --no-build-isolation "torchreid @ git+https://github.com/KaiyangZhou/deep-person-reid.git@master"
          pytest tests/ -v --ignore=tests/test_person_detection.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          REDIS_URL: redis://localhost:6379/0

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/pickleclips
            git pull origin main
            cd backend
            grep -v "torchreid" requirements.txt | pip install -r /dev/stdin
            pip install --no-build-isolation "torchreid @ git+https://github.com/KaiyangZhou/deep-person-reid.git@master"
            sudo systemctl restart pickleclips-api
            sudo systemctl restart pickleclips-worker
            sudo systemctl restart pickleclips-beat
