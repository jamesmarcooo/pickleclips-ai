name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        # Skips until EC2_HOST secret is configured in repo settings
        if: ${{ secrets.EC2_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/pickleclips
            git pull origin main
            cd backend
            pip install -r requirements.txt
            sudo systemctl restart pickleclips-api
            sudo systemctl restart pickleclips-worker
            sudo systemctl restart pickleclips-beat
